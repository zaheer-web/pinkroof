<!doctype html>
<html lang="en">

<head>

  <!-- Basic -->
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- Title -->
  <title>
    PinkRoof | Luxury Interior Design & Architecture Studio
  </title>

  <!-- SEO Meta -->
  <meta
    name="description"
    content="PinkRoof is a premium interior design and architecture studio creating modern, luxurious and functional residential and commercial spaces."
  />

  <meta
    name="keywords"
    content="PinkRoof interior design, luxury interiors, architecture studio, residential interiors, commercial interiors, modern interior design, home interiors, office interiors"
  />

  <meta
    name="author"
    content="PinkRoof"
  />

  <!-- Canonical -->
  <link
    rel="canonical"
    href="https://pinkroof.in/"
  />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/svg+xml"
    href="/favicon.svg"
  />

  <!-- Open Graph -->
  <meta
    property="og:title"
    content="PinkRoof | Luxury Interior Design Studio"
  />

  <meta
    property="og:description"
    content="Transform your spaces with PinkRoof modern interior and architecture solutions."
  />

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:url"
    content="https://pinkroof.in/"
  />

  <meta
    property="og:image"
    content="https://pinkroof.in/og-image.jpg"
  />

  <!-- Twitter -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="PinkRoof Interior Design"
  />

  <meta
    name="twitter:description"
    content="Luxury interior and architecture studio."
  />

  <meta
    name="twitter:image"
    content="https://pinkroof.in/og-image.jpg"
  />

  <!-- Theme -->
  <meta
    name="theme-color"
    content="#f5e9df"
  />

  <!-- Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "InteriorDesign",
    "name": "PinkRoof",
    "url": "https://pinkroof.in",
    "logo": "https://pinkroof.in/logo.png",
    "description": "Luxury interior design and architecture studio.",
    "sameAs": [
      "https://instagram.com/pinkroof"
    ]
  }
  </script>

</head>

<body>

  <div id="root"></div>

  <script
    type="module"
    src="/src/main.jsx"
  ></script>

</body>

</html>
